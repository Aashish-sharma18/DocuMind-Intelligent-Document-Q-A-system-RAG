# ── cloudbuild.yaml — Google Cloud Build Configuration ──────────────────────
#
# Triggered automatically on `git push` to main branch (configure in GCP Console).
# Or run manually:  gcloud builds submit --config cloudbuild.yaml .
#
# Substitution variables — set these in Cloud Build trigger settings:
#   _REGION        : e.g. us-central1
#   _SERVICE_NAME  : e.g. documind
#   _LLM_PROVIDER  : groq  (or gemini)
#   _SECRET_NAME   : your secret name in Secret Manager for the API key

substitutions:
  _REGION:       "us-central1"
  _SERVICE_NAME: "documind"
  _LLM_PROVIDER: "groq"

steps:

  # Step 1: Build the Docker image
  - name: "gcr.io/cloud-builders/docker"
    id: "build-image"
    args:
      - "build"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:$SHORT_SHA"
      - "-t"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:latest"
      - "."

  # Step 2: Push image to Artifact Registry
  - name: "gcr.io/cloud-builders/docker"
    id: "push-image"
    args:
      - "push"
      - "--all-tags"
      - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}"

  # Step 3: Deploy to Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-cloud-run"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "${_SERVICE_NAME}"
      - "--image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:$SHORT_SHA"
      - "--region=${_REGION}"
      - "--platform=managed"
      - "--allow-unauthenticated"
      - "--memory=2Gi"
      - "--cpu=2"
      - "--min-instances=0"
      - "--max-instances=5"
      - "--timeout=120"
      - "--set-env-vars=LLM_PROVIDER=${_LLM_PROVIDER}"
      - "--update-secrets=GROQ_API_KEY=groq-api-key:latest"

images:
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:$SHORT_SHA"
  - "${_REGION}-docker.pkg.dev/$PROJECT_ID/${_SERVICE_NAME}/${_SERVICE_NAME}:latest"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

timeout: "1200s"